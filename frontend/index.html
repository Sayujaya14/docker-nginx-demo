<!DOCTYPE html>
<html>
<head>
  <title>Microservices UI</title>
</head>
<body>
  <h1>Microservices Dashboard</h1>

  <button onclick="callApi('/auth/')">Call Auth Service</button>
  <button onclick="callApi('/products/')">Call Product Service</button>
  <button onclick="callApi('/orders/')">Call Order Service</button>

  <pre id="output">Click a button...</pre>

  <script>
    async function callApi(path) {
      const res = await fetch(path);
      const data = await res.json();
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
