services:
  auth-service-1:
    build: ./auth-service
    container_name: auth-service-1
    networks:
      - app-network

  auth-service-2:
    build: ./auth-service
    container_name: auth-service-2
    networks:
      - app-network

  product-service-1:
    build: ./product-service
    container_name: product-service-1
    networks:
      - app-network

  product-service-2:
    build: ./product-service
    container_name: product-service-2
    networks:
      - app-network
  order-service-1:
    build: ./order-service
    container_name: order-service-1
    networks:
      - app-network

  order-service-2:
    build: ./order-service
    container_name: order-service-2
    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    depends_on:
      - auth-service-1
      - auth-service-2
      - product-service-1
      - product-service-2
      - order-service-1
      - order-service-2
    networks:
      - app-network

networks:
  app-network:
    driver: bridge