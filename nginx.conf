upstream backend_servers {
    server backend1:3000 weight=2;
    server backend2:3000 weight=1;
    server backend3:3000 weight=1;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api {
        proxy_pass http://backend_servers;
    }
}